<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <title>Strength Log</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <p class="eyebrow">Daily Strength</p>
      <h1>Strength Log</h1>
    </header>

    <main>
      <section id="home" class="screen active">
        <div class="hero-card">
          <p class="muted">Today</p>
          <div class="main-number">0</div>
          <p class="label">squats completed</p>
          <div class="progress-track">
            <div class="progress-fill" style="width:0%"></div>
          </div>
          <p class="muted">Goal: 0 / 50</p>
        </div>

        <div class="card">
          <h2>Add squats</h2>
          <div class="quick-grid">
            <button>+5</button>
            <button>+10</button>
            <button>+15</button>
            <button>+20</button>
            <button>+25</button>
            <button>+50</button>
          </div>
        </div>
      </section>

      <section id="progress" class="screen">
        <div class="card">
          <h2>Progress</h2>
          <p class="muted">Weekly and monthly trends will go here.</p>
        </div>
      </section>

      <section id="history" class="screen">
        <div class="card">
          <h2>History</h2>
          <p class="muted">Logged days will appear here.</p>
        </div>
      </section>

      <section id="goals" class="screen">
        <div class="card">
          <h2>Goals</h2>
          <p class="muted">Daily, weekly, and monthly goals will go here.</p>
        </div>
      </section>
    </main>

    <nav class="bottom-nav">
      <button class="nav-btn active" data-screen="home">Home</button>
      <button class="nav-btn" data-screen="progress">Progress</button>
      <button class="nav-btn" data-screen="history">History</button>
      <button class="nav-btn" data-screen="goals">Goals</button>
    </nav>
  </div>

  <script src="app.js"></script>
</body>
</html>
